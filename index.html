<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界の中での恵まれ度チェッカー</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --card: #12122a;
            --card-hover: #1c1c38;
            --border: rgba(255,255,255,0.08);
            --primary: #7c6fff;
            --primary-light: #a899ff;
            --accent: #ff6b9d;
            --success: #4ecca3;
            --warning: #ffd93d;
            --danger: #ff6b6b;
            --text: #e8e8f0;
            --text-muted: #8888aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--del);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.75; }
        }

        #app {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 28px 20px 80px;
        }

        /* ====== WELCOME ====== */
        .welcome {
            text-align: center;
            padding: 48px 16px 40px;
            animation: fadeUp 0.6s ease;
        }

        .welcome-globe {
            font-size: 5.5rem;
            display: block;
            margin-bottom: 24px;
            animation: float 3.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-14px); }
        }

        .welcome h1 {
            font-size: clamp(1.7rem, 5vw, 2.6rem);
            font-weight: 800;
            line-height: 1.3;
            background: linear-gradient(135deg, #a899ff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.8;
            max-width: 460px;
            margin: 0 auto 36px;
        }

        .welcome-note {
            margin-top: 18px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* ====== PROGRESS ====== */
        .progress-wrap {
            margin-bottom: 28px;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .progress-track {
            background: rgba(255,255,255,0.07);
            border-radius: 99px;
            height: 5px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, #7c6fff, #ff6b9d);
            transition: width 0.4s ease;
        }

        /* ====== QUESTION CARD ====== */
        .q-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 32px 28px;
            margin-bottom: 20px;
            animation: fadeUp 0.35s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .q-icon { font-size: 2.6rem; display: block; margin-bottom: 14px; }

        .q-num {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--primary-light);
            margin-bottom: 6px;
        }

        .q-title {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .q-context {
            font-size: 0.83rem;
            color: var(--text-muted);
            line-height: 1.7;
            padding: 10px 14px;
            border-left: 3px solid var(--primary);
            background: rgba(124,111,255,0.07);
            border-radius: 0 8px 8px 0;
            margin-bottom: 22px;
        }

        /* ====== OPTIONS ====== */
        .options { display: flex; flex-direction: column; gap: 11px; }

        .option {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 15px 18px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .option:hover {
            background: var(--card-hover);
            border-color: rgba(124,111,255,0.5);
            transform: translateX(4px);
        }

        .option.selected {
            background: rgba(124,111,255,0.13);
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .opt-icon { font-size: 1.5rem; flex-shrink: 0; }

        .opt-body { flex: 1; }
        .opt-text { font-size: 0.93rem; font-weight: 500; margin-bottom: 2px; }
        .opt-detail { font-size: 0.78rem; color: var(--text-muted); }

        .opt-check {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            font-size: 0.75rem; font-weight: bold; color: white;
        }

        .option.selected .opt-check {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* ====== BUTTONS ====== */
        .nav-row {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 13px 28px;
            border-radius: 12px;
            font-size: 0.93rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.22s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c6fff, #ff6b9d);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            opacity: 0.88;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124,111,255,0.4);
        }

        .btn-primary:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .btn-ghost {
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: rgba(255,255,255,0.09);
            color: var(--text);
        }

        /* ====== RESULT ====== */
        .result { animation: fadeUp 0.5s ease; }

        .result-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .result-header h2 {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 800;
            margin-bottom: 6px;
        }

        .result-header p { color: var(--text-muted); font-size: 0.88rem; }

        /* Gauge */
        .gauge-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 36px;
        }

        .gauge-box {
            position: relative;
            width: 210px;
            height: 210px;
        }

        .gauge-svg { display: block; }

        .gauge-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .gauge-num {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #a899ff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gauge-unit { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .level-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 99px;
            font-size: 0.88rem;
            font-weight: 700;
            margin: 16px 0 12px;
        }

        .score-msg {
            text-align: center;
            max-width: 430px;
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.75;
        }

        /* Breakdown */
        .section-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 26px 24px;
            margin-bottom: 20px;
        }

        .section-card h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .bd-item { margin-bottom: 14px; }
        .bd-item:last-child { margin-bottom: 0; }

        .bd-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .bd-name { font-size: 0.83rem; font-weight: 500; }
        .bd-val { font-size: 0.8rem; font-weight: 700; }

        .bd-track {
            background: rgba(255,255,255,0.06);
            border-radius: 99px;
            height: 7px;
            overflow: hidden;
        }

        .bd-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 1.1s ease;
        }

        /* Insight */
        .insight {
            background: rgba(124,111,255,0.07);
            border: 1px solid rgba(124,111,255,0.18);
            border-radius: 16px;
            padding: 20px 22px;
            margin-bottom: 20px;
        }

        .insight h4 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-light);
            margin-bottom: 8px;
        }

        .insight p {
            font-size: 0.83rem;
            color: var(--text-muted);
            line-height: 1.75;
        }

        .result-footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .q-card { padding: 22px 16px; }
            .section-card { padding: 20px 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-stars" id="stars"></div>
    <div id="app"></div>

<script>
/* ---------- Stars ---------- */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    const sz = Math.random() * 2.2 + 0.5;
    s.className = 'star';
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;--del:${(Math.random()*5).toFixed(1)}s`;
    starsEl.appendChild(s);
}

/* ---------- Data ---------- */
const questions = [

    },
    {
        icon: '🍚',

        options: [
            { text: '毎日、好きなものを十分に食べられる', detail: '世界人口の約58%程度', score: 87, icon: '🍽️' },

    },

        options: [
            { text: '特に大きな健康上の問題はない', detail: '最も恵まれた状況', score: 85, icon: '💪' },

            { text: '部分的な自由がある（一部制限あり）', detail: '世界人口の約20%', score: 55, icon: '⚖️' },

/* ---------- State ---------- */
let screen = 'welcome';
let qIdx = 0;
let answers = new Array(questions.length).fill(null);

/* ---------- Helpers ---------- */
function scoreColor(s) {
    if (s >= 72) return '#4ecca3';
    if (s >= 48) return '#7c6fff';
    if (s >= 24) return '#ffd93d';
    return '#ff6b6b';
}

function levelInfo(s) {
    if (s >= 78) return { label: '非常に恵まれている ✨', color: '#4ecca3', bg: 'rgba(78,204,163,0.15)' };
    if (s >= 58) return { label: 'かなり恵まれている 🌟', color: '#7c6fff', bg: 'rgba(124,111,255,0.15)' };
    if (s >= 38) return { label: '世界平均に近い 🌏', color: '#ffd93d', bg: 'rgba(255,217,61,0.15)' };
    if (s >= 18) return { label: '困難な環境にある 💙', color: '#ff9f43', bg: 'rgba(255,159,67,0.15)' };
    return { label: '非常に困難な環境 ❤️', color: '#ff6b6b', bg: 'rgba(255,107,107,0.15)' };
}

function getMessage(s) {
    if (s >= 78) return 'あなたは世界の多くの人と比べて、非常に恵まれた環境に生きています。この状況は努力だけでなく、生まれた場所・時代・家庭など、自分では選べない要素に大きく左右されています。この幸運を大切にしながら、他者への思いやりを忘れないでいてください。';
    if (s >= 58) return 'あなたは世界平均と比べて、かなり恵まれた環境にいます。多くの機会と安全が保障された生活は、決して当たり前ではありません。世界には今この瞬間も困難と闘っている人たちがいることを心に留めておきましょう。';
    if (s >= 38) return 'あなたは世界の中で中程度の状況にいます。恵まれた部分もあれば、課題を抱える部分もあることでしょう。すべての人に固有の困難と喜びがあり、状況の違いを超えてつながることが大切です。';
    if (s >= 18) return 'あなたはいくつかの困難な状況に置かれています。それでも毎日を生き抜いているあなたの強さは素晴らしいものです。世界中で、より公平な社会を求める声が上がっています。';
    return 'あなたは非常に困難な環境に置かれています。その中でも今日をここまで生き抜いてきた強さを大切にしてください。世界中の人々が、あなたのような状況がなくなる日を目指して行動しています。';
}

/* ---------- Render ---------- */
function render() {
    const app = document.getElementById('app');
    if (screen === 'welcome') app.innerHTML = renderWelcome();
    else if (screen === 'quiz')   app.innerHTML = renderQuiz();
    else                          app.innerHTML = renderResult();
    window.scrollTo({ top: 0 });
    if (screen === 'result') animateResult();
}

function renderWelcome() {
    return `
    <div class="welcome">
        <span class="welcome-globe">🌏</span>
        <h1>世界の中での<br>あなたの恵まれ度</h1>
        <p>私たちが生まれ落ちる環境は、自分では選べません。<br>
        10の質問に答えて、世界約80億人の中で<br>
        あなたがどれくらい恵まれているかを確認してみましょう。</p>
        <button class="btn btn-primary" style="padding:15px 44px;font-size:1.05rem;" onclick="startQuiz()">はじめる →</button>
        <p class="welcome-note">データは世界銀行・国連等の公開統計に基づく概算値です</p>
    </div>`;
}

function renderQuiz() {
    const q = questions[qIdx];
    const sel = answers[qIdx];
    const pct = (qIdx / questions.length) * 100;
    return `
    <div class="progress-wrap">
        <div class="progress-meta">
            <span>質問 ${qIdx + 1} / ${questions.length}</span>
            <span>${Math.round(pct)}% 完了</span>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
        <span class="q-icon">${q.icon}</span>
        <div class="q-num">質問 ${qIdx + 1}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-context">${q.context}</div>
        <div class="options">
            ${q.options.map((o, i) => `
            <div class="option ${sel === i ? 'selected' : ''}" onclick="pick(${i})">
                <span class="opt-icon">${o.icon}</span>
                <div class="opt-body">
                    <div class="opt-text">${o.text}</div>
                    <div class="opt-detail">${o.detail}</div>
                </div>
                <div class="opt-check">${sel === i ? '✓' : ''}</div>
            </div>`).join('')}
        </div>
    </div>
    <div class="nav-row">
        ${qIdx > 0 ? `<button class="btn btn-ghost" onclick="prev()">← 戻る</button>` : ''}
        <button class="btn btn-primary" onclick="next()" ${sel === null ? 'disabled' : ''}>
            ${qIdx < questions.length - 1 ? '次へ →' : '結果を見る 🎯'}
        </button>
    </div>`;
}

function renderResult() {
    const scores = answers.map((a, i) => a !== null ? questions[i].options[a].score : 50);
    const total = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
    const lv = levelInfo(total);
    const msg = getMessage(total);

    const R = 86;
    const C = 2 * Math.PI * R;
    const filled = (total / 100) * C;
    const col = scoreColor(total);

    return `
    <div class="result">
        <div class="result-header">
            <h2>あなたの恵まれ度スコア</h2>
            <p>世界約80億人との比較</p>
        </div>

        <div class="gauge-wrap">
            <div class="gauge-box">
                <svg class="gauge-svg" width="210" height="210" viewBox="0 0 210 210">
                    <defs>
                        <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="${col}"/>
                            <stop offset="100%" stop-color="${col === '#4ecca3' ? '#7c6fff' : col === '#7c6fff' ? '#a899ff' : col === '#ffd93d' ? '#ff9f43' : '#ff8e8e'}"/>
                        </linearGradient>
                    </defs>
                    <circle cx="105" cy="105" r="${R}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="14"/>
                    <circle id="gArc" cx="105" cy="105" r="${R}" fill="none"
                        stroke="url(#gg)" stroke-width="14" stroke-linecap="round"
                        transform="rotate(-90 105 105)"
                        stroke-dasharray="0 ${C}"
                        data-target="${filled}" data-total="${C}"/>
                </svg>
                <div class="gauge-center">
                    <div class="gauge-num" id="gNum">0</div>
                    <div class="gauge-unit">/ 100点</div>
                </div>
            </div>
            <span class="level-badge" style="background:${lv.bg};color:${lv.color}">${lv.label}</span>
            <p class="score-msg">${msg}</p>
        </div>

        <div class="section-card">
            <h3>📊 カテゴリー別スコア</h3>
            ${questions.map((q, i) => {
                const s = scores[i];
                const c = scoreColor(s);
                return `
                <div class="bd-item">
                    <div class="bd-row">
                        <span class="bd-name">${q.icon} ${q.short}</span>
                        <span class="bd-val" style="color:${c}">${s}</span>
                    </div>
                    <div class="bd-track">
                        <div class="bd-fill" data-w="${s}" style="width:0%;background:${c};opacity:0.85"></div>
                    </div>
                </div>`;
            }).join('')}
        </div>

        <div class="insight">
            <h4>💡 このスコアについて</h4>
            <p>スコアは、世界銀行・国連・フリーダムハウスなどの統計に基づく概算です。
            スコアが高い項目は「その恩恵を受けられていない人が世界に多い」ことを意味します。
            恵まれた条件への感謝と、世界をより公平にするための意識のヒントにしていただければ幸いです。</p>
        </div>

        <div style="text-align:center;margin-bottom:20px">
            <button class="btn btn-primary" onclick="restart()">🔄 もう一度チェックする</button>
        </div>

        <p class="result-footer">
            データ出典: 世界銀行 (2023)、UNICEF、フリーダムハウス (2024)、ITU、WFP 等の統計を基にした概算値です。<br>
            正確な数値は出典・年度により異なります。
        </p>
    </div>`;
}

/* ---------- Animations ---------- */
function animateResult() {
    const arc = document.getElementById('gArc');
    const num = document.getElementById('gNum');
    if (!arc || !num) return;

    const target = parseFloat(arc.dataset.target);
    const total  = parseFloat(arc.dataset.total);
    const scoreTarget = parseInt(document.querySelector('.gauge-num, #gNum')?.closest('.gauge-box')
        ?.querySelector('[data-target]')?.dataset.target || 0);

    // Compute score from total score shown in gArc
    const finalScore = Math.round((target / total) * 100);

    let t = 0;
    const dur = 1400;
    const step = 16;
    const timer = setInterval(() => {
        t = Math.min(t + step, dur);
        const ease = 1 - Math.pow(1 - t / dur, 3);
        const cur = target * ease;
        arc.setAttribute('stroke-dasharray', `${cur} ${total}`);
        num.textContent = Math.round(finalScore * ease);
        if (t >= dur) clearInterval(timer);
    }, step);

    // Animate bars
    setTimeout(() => {
        document.querySelectorAll('.bd-fill').forEach(el => {
            el.style.width = el.dataset.w + '%';
        });
    }, 200);
}

/* ---------- Actions ---------- */
function startQuiz() {
    answers = new Array(questions.length).fill(null);
    qIdx = 0;
    screen = 'quiz';
    render();
}

function pick(i) {
    answers[qIdx] = i;
    render();
}

function next() {
    if (answers[qIdx] === null) return;
    if (qIdx < questions.length - 1) { qIdx++; render(); }
    else { screen = 'result'; render(); }
}

function prev() {
    if (qIdx > 0) { qIdx--; render(); }
}

function restart() {
    screen = 'welcome';
    render();
}

render();
</script>
</body>
</html>
